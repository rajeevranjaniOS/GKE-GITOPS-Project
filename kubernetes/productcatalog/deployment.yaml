apiVersion: apps/v1
kind: Deployment

metadata:
  name: productcatalogservice
  namespace: online-boutique

  labels:
    app: productcatalogservice

spec:
  replicas: 2

  selector:
    matchLabels:
      app: productcatalogservice

  template:
    metadata:
      labels:
        app: productcatalogservice

    spec:
      containers:

      - name: server

        image: us-central1-docker.pkg.dev/google-samples/microservices-demo/productcatalogservice:v0.10.2

        ports:
        - containerPort: 3550

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "300m"
            memory: "256Mi"

        readinessProbe:
          tcpSocket:
            port: 3550

          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          tcpSocket:
            port: 3550

          initialDelaySeconds: 20
          periodSeconds: 20