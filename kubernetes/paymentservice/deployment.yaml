apiVersion: apps/v1
kind: Deployment

metadata:
  name: paymentservice
  namespace: online-boutique
  labels:
    app: paymentservice

spec:
  replicas: 2

  selector:
    matchLabels:
      app: paymentservice

  template:
    metadata:
      labels:
        app: paymentservice

    spec:
      containers:
      - name: server

        image: us-central1-docker.pkg.dev/google-samples/microservices-demo/paymentservice:v0.10.5

        ports:
        - containerPort: 50051

        env:
        - name: PORT
          value: "50051"

        - name: DISABLE_PROFILER
          value: "1"

        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"

          limits:
            cpu: "200m"
            memory: "128Mi"

        readinessProbe:
          grpc:
            port: 50051

        livenessProbe:
          grpc:
            port: 50051