apiVersion: apps/v1
kind: Deployment

metadata:
  name: shippingservice
  namespace: online-boutique
  labels:
    app: shippingservice

spec:
  replicas: 2

  selector:
    matchLabels:
      app: shippingservice

  template:
    metadata:
      labels:
        app: shippingservice

    spec:
      containers:
      - name: server

        image: us-central1-docker.pkg.dev/google-samples/microservices-demo/shippingservice:v0.10.5

        ports:
        - containerPort: 50051

        env:
        - name: PORT
          value: "50051"

        - name: DISABLE_PROFILER
          value: "1"

        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"

          limits:
            cpu: "200m"
            memory: "128Mi"

        readinessProbe:
          grpc:
            port: 50051
          periodSeconds: 5

        livenessProbe:
          grpc:
            port: 50051